name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions: write-all
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Static Test with ESLint
        run: npm run lint
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Create .env file
        run: |
          touch .env
          echo "AUTH_Basic_username=${{ secrets.AUTH_BASIC_USERNAME }}" >> .env
          echo "AUTH_Basic_password=${{ secrets.AUTH_BASIC_PASSWORD }}" >> .env
          echo "AUTH_Form_username=${{ secrets.AUTH_FORM_USERNAME }}" >> .env
          echo "AUTH_Form_password=${{ secrets.AUTH_FORM_PASSWORD }}" >> .env
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
